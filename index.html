<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KeyGen Panel</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0d1117;color:#c9d1d9;font-family:system-ui,sans-serif;padding:20px}
        .container{max-width:900px;margin:0 auto}
        h1{color:#58a6ff;margin-bottom:4px;font-size:26px}
        .sub{color:#8b949e;margin-bottom:20px;font-size:13px}
        .card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:20px;margin-bottom:16px}
        .card h2{color:#f0f6fc;margin-bottom:12px;font-size:16px}
        .row{display:flex;gap:12px;flex-wrap:wrap}
        .fg{flex:1;min-width:150px;margin-bottom:12px}
        .fg label{display:block;margin-bottom:4px;font-size:12px;color:#c9d1d9;font-weight:500}
        .fg input,.fg select{width:100%;padding:8px 10px;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#c9d1d9;font-size:13px}
        .fg input:focus,.fg select:focus{outline:none;border-color:#58a6ff}
        button{padding:8px 16px;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer}
        .btn-primary{background:#238636;color:#fff}
        .btn-primary:hover{background:#2ea043}
        .btn-red{background:#da3633;color:#fff}
        .btn-red:hover{background:#f85149}
        .btn-yellow{background:#d2991d;color:#000}
        .btn-sm{background:#30363d;color:#c9d1d9;padding:4px 10px;font-size:11px}
        table{width:100%;border-collapse:collapse;margin-top:10px;font-size:12px}
        th,td{padding:8px 10px;text-align:left;border-bottom:1px solid #21262d}
        th{color:#8b949e;font-size:10px;text-transform:uppercase}
        tr:hover td{background:#1c2129}
        .kc{font-family:monospace;color:#7ee787}
        .sa{color:#3fb950;font-weight:600}
        .se{color:#f85149;font-weight:600}
        .su{color:#d2991d;font-weight:600}
        .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
        .st{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:12px;text-align:center}
        .st h3{color:#8b949e;font-size:10px;text-transform:uppercase}
        .st .v{color:#f0f6fc;font-size:24px;font-weight:700}
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:999;justify-content:center;align-items:center}
        .modal.show{display:flex}
        .mc{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:20px;max-width:450px;width:90%}
        .gkeys{background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:12px;max-height:160px;overflow-y:auto;margin:12px 0;font-family:monospace;font-size:12px;color:#7ee787;white-space:pre-wrap}
        .toast{position:fixed;bottom:20px;right:20px;padding:10px 16px;border-radius:6px;color:#fff;font-weight:600;z-index:2000;animation:in .3s}
        @keyframes in{from{transform:translateX(100px);opacity:0}to{transform:translateX(0);opacity:1}}
        .ok{background:#238636}.err{background:#da3633}
    </style>
</head>
<body>
    <div class="container">
        <h1>KeyGen</h1>
        <p class="sub">License Manager</p>
        <div class="stats">
            <div class="st"><h3>Total</h3><div class="v" id="s0">0</div></div>
            <div class="st"><h3>Active</h3><div class="v" id="s1">0</div></div>
            <div class="st"><h3>Unused</h3><div class="v" id="s2">0</div></div>
            <div class="st"><h3>Expired</h3><div class="v" id="s3">0</div></div>
        </div>

        <div class="card">
            <h2>Generate Keys</h2>
            <div class="row">
                <div class="fg"><label>Count</label><input type="number" id="gc" value="1" min="1" max="100"></div>
                <div class="fg"><label>Type</label><select id="gt"><option value="lifetime">Lifetime</option><option value="30days">30 Days</option><option value="90days">90 Days</option><option value="365days">1 Year</option><option value="custom">Custom</option></select></div>
                <div class="fg" id="cdg" style="display:none"><label>Days</label><input type="number" id="gcd" value="7" min="1"></div>
                <div class="fg"><label>Product</label><input type="text" id="gp" placeholder="App name"></div>
            </div>
            <div class="row" style="align-items:flex-end">
                <div class="fg"><label>Admin Password</label><input type="password" id="gpw"></div>
                <div class="fg"><button class="btn-primary" onclick="gen()" style="width:100%">Generate</button></div>
            </div>
        </div>

        <div class="card">
            <h2>Keys <button class="btn-yellow" onclick="load()" style="float:right">Refresh</button></h2>
            <button class="btn-sm" onclick="exp()">Export</button>
            <button class="btn-red" onclick="delAll()" style="margin-left:4px">Delete All</button>
            <table><thead><tr><th>Key</th><th>Type</th><th>Status</th><th>Product</th><th>Expires</th><th>Used</th><th>Act</th></tr></thead><tbody id="tb"></tbody></table>
        </div>
    </div>

    <div class="modal" id="md"><div class="mc"><h3>Generated</h3><div class="gkeys" id="gk"></div><button class="btn-primary" onclick="cpy()">Copy</button><button class="btn-yellow" onclick="dl()">Download</button><button class="btn-red" onclick="cls()">Close</button></div></div>

    <script>
        // Points to YOUR Cloudflare Pages domain (same origin, so no CORS issues)
        // If using same domain, just use '/api'
        const BASE = '/api';
        let keys = [], lg = [];

        async function api(p, m='GET', b=null, a=''){
            const o={method:m,headers:{}};
            if(b){o.headers['Content-Type']='application/json';o.body=JSON.stringify(b)}
            if(a)o.headers['Authorization']=a;
            const r=await fetch(BASE+p,o);
            return r.json();
        }

        async function load(){
            keys=await api('/keys'); render();
        }

        function render(){
            const n=new Date();
            let t=0,a=0,u=0,e=0;
            keys.forEach(k=>{
                t++;
                if(k.status==='active'&&k.expires&&new Date(k.expires)<n){k.status='expired';e++}
                else if(k.status==='active')a++;
                else if(k.status==='unused')u++;
                else if(k.status==='expired')e++;
            });
            s0.textContent=t;s1.textContent=a;s2.textContent=u;s3.textContent=e;
            tb.innerHTML=keys.length?keys.map(k=>{
                const ex=k.expires?new Date(k.expires).toLocaleDateString():'Never';
                let c='',l='';
                if(k.status==='active'){c='sa';l='ACTIVE'}
                else if(k.status==='expired'){c='se';l='EXPIRED'}
                else{c='su';l='UNUSED'}
                return `<tr><td class="kc">${k.key}</td><td>${k.type}</td><td class="${c}">${l}</td><td>${k.product||'-'}</td><td>${ex}</td><td>${k.usedBy||'-'}</td><td><button class="btn-sm" onclick="navigator.clipboard.writeText('${k.key}')">Copy</button> <button class="btn-yellow btn-sm" onclick="rst('${k.key}')">Reset</button> <button class="btn-red btn-sm" onclick="del('${k.key}')">Del</button></td></tr>`;
            }).join(''):'<tr><td colspan="7" style="text-align:center;color:#8b949e">No keys</td></tr>';
        }

        async function gen(){
            const c=+gc.value||1,t=gt.value,p=gp.value,cd=+gcd.value||7,pw=gpw.value;
            const r=await api('/generate','POST',{count:c,type:t,product:p,customDays:cd},pw);
            if(r.error){return toast(r.error,'err')}
            lg=r.generated.map(k=>k.key);
            gk.textContent=lg.join('\n');md.classList.add('show');load();toast('Done','ok');
        }

        async function del(k){if(!confirm('Delete?'))return;await api('/delete','POST',{key:k},prompt('Password'));load()}
        async function rst(k){await api('/reset','POST',{key:k},prompt('Password'));load()}
        async function delAll(){if(!confirm('ALL?'))return;await api('/delete-all','POST',{},prompt('Password'));load()}
        function cpy(){navigator.clipboard.writeText(lg.join('\n'));toast('Copied','ok')}
        function dl(){const b=new Blob([lg.join('\n')]);const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='keys.txt';a.click()}
        function cls(){md.classList.remove('show')}
        function exp(){const csv=['key,type,status,product,expires,usedBy'];keys.forEach(k=>csv.push(`${k.key},${k.type},${k.status},${k.product||''},${k.expires||''},${k.usedBy||''}`));const b=new Blob([csv.join('\n')]);const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='export.csv';a.click()}
        function toast(m,c){const d=document.createElement('div');d.className=`toast ${c}`;d.textContent=m;document.body.appendChild(d);setTimeout(()=>d.remove(),2500)}

        gt.addEventListener('change',()=>cdg.style.display=gt.value==='custom'?'block':'none');
        md.addEventListener('click',e=>{if(e.target===md)cls()});
        load();
    </script>
</body>
</html>
